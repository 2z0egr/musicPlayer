<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music player</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons">
    <style>
        body, div, h2, p, ul, li{ margin: 0; padding: 0; box-sizing: border-box; }
        ul{ list-style: none;}
        :root{
            --color-yellow: #fc0;
            --body-bg:#36453b;
            --play-bg:#d4d4d4;
            --color-light:#efefef;
            --color-shadow:#405146;
            --bar-bg:#3e5641;
            --text-size:24px;
            --text-color: #1f3628;
        }
        body{
            height: 100vh; background: var(--body-bg);
            display: flex; justify-content: center; align-items: center;
        }
        .player_body{ 
            width: 360px; padding: 40px 30px; border-radius: 20px; 
            background: var(--play-bg);
            user-select: none; position: relative;
            box-shadow: 3px 3px 8px #343434, 
                        3px 3px 5px 0 var(--color-light) inset, 
                        -3px -3px 3px 0 var(--color-shadow) inset;
        }
        .top{margin-bottom: 25px;}
        .top>h2{
            font-size: var(--text-size); font-weight: 800; color: var(--text-color); 
            text-align: center;
            text-shadow: -1px -1px 1px var(--color-light), 1px 1px 1px var(--color-shadow);
        }
        .album{
            width: 260px; height: 260px; border-radius: 12px; overflow: hidden;
            margin: 0 auto; border: 14px solid #ccc;
            box-shadow: -2px -2px 4px var(--color-light), 2px 2px 4px var(--color-shadow);

        }
        .album>img{
            width: 100%; height: 100%; object-fit: cover; object-position: center bottom;
        }
        .info{
            text-align: center; font-size: calc(var(--text-size) * 1);
            font-weight: 600; color: var(--text-color); 
            text-shadow: -1px -1px 1px var(--color-light), 1px 1px 1px var(--color-shadow);
            margin: 26px;
        }
        .info>.artist{ font-size: calc(var(--text-size) * 0.7); margin-top: 3px; font-weight: 500;}

        .progress{
            height: 8px; border-radius: 8px; background: var(--play-bg);
            box-shadow: 2px 2px 2px 0 var(--color-shadow), 
                        -2px -2px 2px 0 var(--color-light); 
        }
        .progress>.bar{
            width: 8%; height: 8px; border-radius: 8px; background: var(--bar-bg);
            box-shadow: 2px 2px 3px 0 var(--color-shadow) inset;
        }
        .progress>.timebox{
            margin-top: 8px; font-size: calc(var(--text-size) * 0.6);
            display: flex; justify-content: space-between; color: var(--text-color);
        }
        .progress>.timebox>span{ text-shadow: 1px 1px 0 var(--color-light); }
        .controls{
            margin-top: 50px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .controls>span:not(#repeatBtn,#listBtn){
            font-size: var(--text-size); width: 40px; height: 40px; border-radius: 50%;
            background: var(--play-bg); color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            box-shadow: -2px -2px 2px 0 var(--color-light), 
                        2px 2px 2px 0 var(--color-shadow);
            text-shadow: 1px 1px 0 var(--color-light);
        }
        .controls>#repeatBtn,.controls>#listBtn{
            font-size: var(--text-size); width: 40px; height: 40px;
            background: var(--play-bg); color: var(--bar-bg);
            display: flex; justify-content: center; align-items: center;
        }
        .controls>span:hover:not(#repeatBtn,#listBtn), .controls>span:active:not(#repeatBtn,#listBtn){
            color: var(--color-light);
            box-shadow: -2px -3px 3px 0 var(--color-light), 
                        2px 3px 3px 0 var(--color-shadow);
        }

        .controls>#repeatBtn:hover, .controls>#listBtn:hover{
            color: var(--color-light);
        }
        .play_list{
            position: absolute; left: 40px; top: 90px; width: 280px; min-height: 340px;
            background: var(--text-color); opacity: 96%; color: var(--color-light);
            padding: 20px; box-sizing: border-box; border-radius: 20px;
            display: none;
        }
        .play_list.active{ display: block; }
        .play_list li{
            border-bottom: 1px solid var(--color-light); font-size: 16px;
            padding: 8px 0;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .play_list li>strong{ font-weight: normal;}
        .play_list li>em{ font-style: normal; font-size: 12px;}

        .volume{ position: absolute; right: 23px; top: 28%;}
        input[type=range][orient=vertical]{
            writing-mode: vertical-lr;
            appearance: slider-vertical;
            width: 7px;
            -webkit-appearance: none;
            background: var(--bar-bg);
            accent-color: var(--color-light); 
            box-shadow: -1px -1px 1px var(--color-light), 2px 2px 2px 0 var(--color-shadow);
            border-radius: 10px;
        }
        /*
        .volume_slider{
            -webkit-appearance:none;
            appearance:none;
        }
        .volume_slider:focus{}
        .volume_slider::-webkit-slider-runnable-track{}
        .volume_slider::-webkit-slider-thumb{
            -webkit-appearance:none;
            appearance:none;
        }
        */
    </style>
</head>
<body>
    <div class="player_body">
        <div class="top">
            <h2>MUSIC PLAYER</h2>
        </div>
        <div class="album">
            <img src="images/album1.jpg" alt="Alone -- Color Out">
        </div>
        <div class="volume">
            <input type="range" min="0" max="100" value="50" class="volume_slider" orient="vertical" oninput="changeVolume()">
        </div>
        <div class="info">
            <p class="name">Alone</p>
            <p class="artist">Color Out</p>
        </div>
        <div class="etc">
            <div class="play_list">
                <ul></ul>
            </div>
        </div>
        <div class="progress">
            <div class="bar"><audio src="" id="mainAudio"></audio></div>
            <div class="timebox">
                <span class="current">0:00</span><span class="duration">0:00</span>
            </div>
        </div>
        <div class="controls"> <!-- material icons -->
            <span id="repeatBtn" class="material-icons">repeat</span>
            <span id="prevBtn" class="material-icons">skip_previous</span>
            <span id="playBtn" class="material-icons">play_arrow</span> <!--pause-->
            <span id="nextBtn" class="material-icons">skip_next</span>
            <span id="listBtn" class="material-icons">queue_music</span>
        </div>
    </div>
    <script src="music_list.js"></script>
    <script>
        const musicApp = document.querySelector('.player_body');
        const musicAudio = musicApp.querySelector('#mainAudio');
        const playBtn = musicApp.querySelector('#playBtn');
        let list_index = 0;

        // -----------------------------------------------
        const albumImg = musicApp.querySelector('.album>img');
        const musicName = musicApp.querySelector('.name');
        const artistName = musicApp.querySelector('.artist');
        const totalTime = musicApp.querySelector('.duration')
        const playTime = musicApp.querySelector('.current')
        const progressive = musicApp.querySelector('.progress')
        const progressBar = musicApp.querySelector('.bar')
        const prevBtn = musicApp.querySelector('#prevBtn')
        const nextBtn = musicApp.querySelector('#nextBtn')
        // -----------------------------------------------
        const loadMusic = (num)=>{
            musicAudio.src = `songs/${musicList[num].audio}.mp3`;
            albumImg.src = `images/${musicList[num].img}.jpg`;
            musicName.innerText = musicList[num].name;
            artistName.innerHTML = musicList[num].artist;
            totalTime.innerHTML = musicList[num].total;
        };
        loadMusic(list_index);

        const musicPlay=()=>{
            playBtn.innerHTML = "pause";
            musicAudio.play();
        };
        const musicPause=()=>{
            playBtn.innerHTML = "play_arrow";
            musicAudio.pause();
        };
        const prevMusic=()=>{
            list_index--;
            if( list_index < 0 ){ list_index = musicList.length-1; }
            loadMusic(list_index);
            musicPlay();
        };
        const nextMusic=()=>{
            list_index++;
            if( list_index >= musicList.length){ list_index = 0; }
            loadMusic(list_index);
            musicPlay();
        };

        playBtn.addEventListener('click', ()=>{
            if(playBtn.innerText=='play_arrow'){
                musicPlay();
            }else{
                musicPause();
            }
        })
        nextBtn.addEventListener('click', ()=>{
            nextMusic();
        })
        prevBtn.addEventListener('click', ()=>{
            prevMusic();
        });

        musicAudio.addEventListener('timeupdate', (e)=>{
            let current = e.target.currentTime;
            let duration = e.target.duration;
            let progressRatio = (current/duration)*100;
            progressBar.style.width = `${progressRatio}%`
            let currentMin = Math.floor(current/60);
            let currentSec = Math.floor(current%60);
            if(currentMin<10){
                currentMin = `0${currentMin}`;
            }
            if(currentSec<10){
                currentSec = `0${currentSec}`;
            }
            playTime.innerHTML = `${currentMin}:${currentSec}`;
        });

        progressive.addEventListener('click', (e)=>{
            let clickPosition = e.offsetX;
            let maxWidth = progressive.clientWidth;
            musicAudio.currentTime = (clickPosition/maxWidth)*musicAudio.duration;
            if(playBtn.innerText == 'play_arrow'){
                musicPlay();
            }
        });

        // ------------------------------------------------------------
        const repeatBtn = musicApp.querySelector('#repeatBtn');
        repeatBtn.addEventListener('click',()=>{
            let getTextrepeat = repeatBtn.innerText;
            if( getTextrepeat == "repeat" ){
                repeatBtn.innerText="repeat_one"
                repeatBtn.setAttribute('title','한곡 반복');
            }else{
                repeatBtn.innerText="repeat";
                repeatBtn.setAttribute('title','전체 반복');
            }
        });
        musicAudio.addEventListener('ended', ()=>{
            let getTextTepeat = repeatBtn.innerHTML;
            if(getTextTepeat=='repeat'){
                nextMusic();
            }else{
                loadMusic(list_index);
                musicPlay();
            }
        })

        const listBox = musicApp.querySelector('.play_list');
        listBox.classList.add('active');
        const fragment = document.createDocumentFragment();
        for(let i=0; i<musicList.length; i++){
            let li = document.createElement('li');
            li.innerHTML = `<strong>${musicList[i].name}</strong><em>${musicList[i].artist}</em>`;
            fragment.appendChild(li);
        }
        listBox.querySelector('ul').appendChild(fragment);
        const listBtn=musicApp.querySelector('#listBtn')
        listBtn.addEventListener('click', ()=>{
            listBox.classList.toggle('active')
        })

        function changeVolume(){
            const volumeSlider=document.querySelector('.volume_slider');
            musicAudio.volume = volumeSlider.value / 100;
        }
        /* const volumeSlider=document.querySelector('.volume_slider');
           volumeSlider.addEventLister('change',()=>{
            musicAudio.volume = volumeSlider.value / 100;
            })
            
            volumeBtn.addEventLister('click',(e)=>{
                e.target.classList.toggle('~') volume.classList.toggle('hide')
                volumeBar.classList.toggle('show')
            })
            volumeBar.addEventLister('change', ()=>{
                musicAudio.volume = musicAudio.value/100;
                let currentVol = musicAudio.volume;
                if(currentVol ==0 ){

                }
            })
        */
    </script>
</body> 
</html>
